name: aaxep
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"


dependencies:
  cupertino_icons: ^1.0.3
  flutter:
    sdk: flutter

  bloc: ^8.0.0
  dwds: ^19.0.0
  flutter_bloc: ^8.0.0
  flutter_dotenv: ^5.0.2
  get: ^4.3.8
  google_fonts: ^2.1.0
  intl: ^0.18.0
  jiffy: ^4.1.0
  logger: ^1.1.0
  lottie: ^1.2.1
  provider: ^6.0.1
  shared_preferences: ^2.0.8
  shimmer: ^2.0.0
  strings: ^1.0.0
  blobs: ^2.0.0
  url_launcher: ^6.0.15
  firebase_core: ^2.0.0
  cloud_firestore: ^4.0.0
  flutter_form_builder: ^7.1.1
  form_builder_validators: ^7.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.4
  build_runner: ^2.1.4
  built_value_generator: ^8.1.3
  dapackages: ^1.6.0
  effective_dart: ^1.3.2
